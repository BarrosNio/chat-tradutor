<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barros Connect - Gold Edition</title>
    <style>
        :root {
            --bg-dark: #050a14;
            --neon-blue: #00e5ff;
            --neon-purple: #9d00ff;
            --neon-green: #39ff14;
            --glass: rgba(5, 10, 20, 0.98);
        }

        body {
            margin: 0;
            background: #121212;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* Animação Nudge (Treme Tela) */
        @keyframes shake {
            0% {
                transform: translate(1px, 1px) rotate(0deg);
            }

            10% {
                transform: translate(-1px, -2px) rotate(-1deg);
            }

            20% {
                transform: translate(-3px, 0px) rotate(1deg);
            }

            30% {
                transform: translate(3px, 2px) rotate(0deg);
            }

            40% {
                transform: translate(1px, -1px) rotate(1deg);
            }

            100% {
                transform: translate(1px, -2px) rotate(-1deg);
            }
        }

        .nudge-active {
            animation: shake 0.5s infinite;
        }

        #floating-app {
            position: fixed;
            top: 40px;
            left: 20px;
            z-index: 10000;
            touch-action: none;
        }

        #bubble {
            width: 60px;
            height: 60px;
            background: var(--bg-dark);
            border: 2px solid var(--neon-blue);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: move;
            box-shadow: 0 0 15px var(--neon-blue);
            font-size: 24px;
            color: var(--neon-blue);
        }

        #chat-card {
            display: none;
            width: 350px;
            height: 550px;
            background: var(--glass);
            border: 1px solid var(--neon-blue);
            border-radius: 20px;
            margin-top: 10px;
            flex-direction: column;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.9);
        }

        .lang-bar {
            display: flex;
            justify-content: space-around;
            padding: 12px;
            background: rgba(0, 229, 255, 0.1);
            border-radius: 20px 20px 0 0;
        }

        .lang-btn {
            color: white;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 10px;
            border: 1px solid transparent;
        }

        .lang-btn.active {
            border-color: var(--neon-blue);
            background: rgba(0, 229, 255, 0.2);
            color: var(--neon-blue);
        }

        #message-display {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-bubble {
            padding: 12px;
            border-radius: 15px;
            color: white;
            font-size: 14px;
            max-width: 85%;
            align-self: flex-end;
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid var(--neon-blue);
        }

        .trans-text {
            display: block;
            font-size: 13px;
            margin-top: 8px;
            color: var(--neon-blue);
            border-top: 1px solid rgba(0, 229, 255, 0.2);
            padding-top: 5px;
            font-style: italic;
        }

        /* Barra Neon da Música */
        .audio-player {
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid var(--neon-green);
            border-radius: 10px;
            padding: 10px;
            margin-top: 5px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .progress-fill {
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, #111 0%, var(--neon-green) 50%, #111 100%);
            background-size: 50% 100%;
            animation: moveNeon 1.5s linear infinite;
        }

        @keyframes moveNeon {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        #emoji-grid {
            display: none;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid var(--neon-blue);
            max-height: 120px;
            overflow-y: auto;
        }

        .emoji-item {
            cursor: pointer;
            font-size: 22px;
            text-align: center;
        }

        #wink-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 20000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 180px;
            opacity: 0;
            transition: 0.3s;
            color: white;
        }

        .input-area {
            padding: 12px;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            border-radius: 0 0 20px 20px;
        }

        #text-input {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--neon-blue);
            color: white;
            padding: 5px;
            outline: none;
        }

        .btn-tool {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: var(--neon-blue);
        }
    </style>
</head>

<body id="main-body">

    <div id="wink-layer"></div>

    <div id="floating-app">
        <div id="bubble" onmousedown="startDrag(event)" ontouchstart="startDrag(event)" onclick="toggleChat()">🌐</div>

        <div id="chat-card">
            <div class="lang-bar">
                <span class="lang-btn active" onclick="setLang('en', event)">EN</span>
                <span class="lang-btn" onclick="setLang('ph', event)">PH</span>
                <span class="lang-btn" onclick="setLang('pt', event)">PT</span>
            </div>

            <div id="message-display"></div>

            <div id="emoji-grid"></div>

            <div class="input-area">
                <button class="btn-tool" onclick="toggleEmoji()">😊</button>
                <button class="btn-tool" onclick="triggerWink('kiss')">💋</button>
                <button class="btn-tool" onclick="triggerWink('tongue')">😛</button>
                <button class="btn-tool" onclick="triggerWink('nudge')">📳</button>
                <label for="file-input" class="btn-tool">📎</label>
                <input type="file" id="file-input" style="display:none" accept="audio/*" onchange="handleFile(event)">

                <input type="text" id="text-input" placeholder="Digite..." autocomplete="off">
                <button onclick="sendMsg()"
                    style="background:var(--neon-blue); border:none; border-radius:50%; width:35px; height:35px; cursor:pointer;">➤</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(); // Conecta ao servidor Socket.IO

        let targetLang = 'en';
        const display = document.getElementById('message-display');
        const emojiGrid = document.getElementById('emoji-grid');
        const input = document.getElementById('text-input');
        const app = document.getElementById('floating-app');
        const chatCard = document.getElementById('chat-card');

        // Popula Emojis
        const emojis = ["😀", "😂", "😍", "🤡", "🔥", "🚀", "💩", "🤔", "🙄", "🤫", "🤝", "🎉", "💔", "✨"];
        emojis.forEach(e => {
            let span = document.createElement('span');
            span.className = 'emoji-item';
            span.innerText = e;
            span.onclick = () => { input.value += e; input.focus(); };
            emojiGrid.appendChild(span);
        });

        function toggleChat() {
            chatCard.style.display = (chatCard.style.display === 'flex') ? 'none' : 'flex';
        }

        function toggleEmoji() {
            emojiGrid.style.display = (emojiGrid.style.display === 'grid') ? 'none' : 'grid';
        }

        function setLang(l, e) {
            targetLang = l;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
        }

        // Tradução + Envio
        async function sendMsg() {
            const text = input.value.trim();
            if (!text) return;

            const div = document.createElement('div');
            div.className = 'msg-bubble';
            div.innerHTML = `${text} <span class="trans-text" id="temp">Traduzindo...</span>`;
            display.appendChild(div);

            const tempSpan = div.querySelector('#temp');
            input.value = "";
            emojiGrid.style.display = 'none';
            display.scrollTop = display.scrollHeight;

            try {
                let langPair = `Autodetect|${targetLang === 'ph' ? 'tl' : targetLang}`;
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${langPair}`);
                const data = await response.json();
                const translatedText = data.responseData.translatedText;
                
                tempSpan.innerText = translatedText;
                tempSpan.removeAttribute('id');

                // Enviar para o servidor
                socket.emit('chatMessage', {
                    originalText: text,
                    translatedText: translatedText,
                    lang: targetLang
                });
            } catch (e) { tempSpan.innerText = "Erro na conexão"; }
        }

        // Receber mensagem de outros usuários
        socket.on('chatMessage', (data) => {
            const div = document.createElement('div');
            div.className = 'msg-bubble';
            // Alinhado à esquerda e com cor ligeiramente diferente
            div.style.alignSelf = 'flex-start';
            div.style.background = 'rgba(157, 0, 255, 0.1)';
            div.style.borderColor = 'var(--neon-purple)';
            div.innerHTML = `${data.originalText} <span class="trans-text" style="color:var(--neon-purple); border-top-color:rgba(157,0,255,0.2)">${data.translatedText}</span>`;
            display.appendChild(div);
            display.scrollTop = display.scrollHeight;
        });

        // Música Local e Compartilhamento
        function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Converter para base64 para enviar via websocket
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Audio = e.target.result;
                
                // Enviar para o servidor
                socket.emit('audioFile', {
                    name: file.name,
                    data: base64Audio
                });

                // Mostrar localmente
                appendAudioToChat(file.name, base64Audio, 'flex-end');
            };
            reader.readAsDataURL(file);
        }

        // Receber música de outros usuários
        socket.on('audioFile', (fileData) => {
            appendAudioToChat(fileData.name, fileData.data, 'flex-start');
        });

        function appendAudioToChat(fileName, audioDataUrl, align) {
            const div = document.createElement('div');
            div.className = 'msg-bubble';
            div.style.alignSelf = align;
            if(align === 'flex-start') {
                div.style.background = 'rgba(157, 0, 255, 0.1)';
                div.style.borderColor = 'var(--neon-purple)';
            }
            div.innerHTML = `
            <div class="audio-player">
                <div style="color:var(--neon-green); font-size:11px; margin-bottom:5px;">📁 ${fileName}</div>
                <div class="progress-bar"><div class="progress-fill"></div></div>
                <audio src="${audioDataUrl}" controls autoplay style="width:100%; height:30px;"></audio>
            </div>
            `;
            display.appendChild(div);
            display.scrollTop = display.scrollHeight;
        }

        // Winks e Nudge
        function triggerWink(type, emit = true) {
            if (emit) {
                socket.emit('wink', type);
            }

            if (type === 'nudge') {
                document.getElementById('main-body').classList.add('nudge-active');
                setTimeout(() => document.getElementById('main-body').classList.remove('nudge-active'), 1000);
            } else {
                const icon = type === 'kiss' ? "😘" : "😛";
                const layer = document.getElementById('wink-layer');
                layer.innerText = icon;
                layer.style.opacity = "1";
                layer.style.transform = "scale(2)";
                setTimeout(() => { layer.style.opacity = "0"; layer.style.transform = "scale(1)"; }, 2000);
            }
        }

        // Receber wink de outros usuários
        socket.on('wink', (type) => {
            triggerWink(type, false);
        });

        // Arrastar
        let isDragging = false, ox, oy;
        function startDrag(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON' || e.target.tagName === 'AUDIO') return;
            isDragging = true;
            const cX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            const cY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
            ox = cX - app.offsetLeft; oy = cY - app.offsetTop;
            document.addEventListener('mousemove', drag);
            document.addEventListener('touchmove', drag, { passive: false });
            document.addEventListener('mouseup', stop);
            document.addEventListener('touchend', stop);
        }
        function drag(e) {
            if (!isDragging) return;
            if (e.type === 'touchmove') e.preventDefault();
            const cX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            const cY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
            app.style.left = (cX - ox) + 'px'; app.style.top = (cY - oy) + 'px';
        }
        function stop() { isDragging = false; }
    </script>
</body>

</html>
